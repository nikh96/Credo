{% extends "base.html" %}

{% block title %}Credo · Something went wrong{% endblock %}

{% block content %}
<div class="dashboard">
    <section class="card" style="max-width: 520px; margin: 3rem auto;">
        <div class="card-header">
            <h2 class="card-title">Something went wrong</h2>
        </div>
        <div class="card-body">
            <p class="muted-text">
                An unexpected error occurred while processing your request.
                Please try again in a moment.
            </p>
            <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
                <a href="{{ url_for('home') }}" class="primary-button">
                    Back to Dashboard
                </a>
                <a href="{{ url_for('login') }}" class="secondary-button">
                    Go to Login
                </a>
            </div>
        </div>
    </section>
</div>
{% endblock %}
