{% extends "base.html" %}

{% block title %}Credo · Page not found{% endblock %}

{% block content %}
<div class="dashboard">
    <section class="card" style="max-width: 520px; margin: 3rem auto;">
        <div class="card-header">
            <h2 class="card-title">Page not found</h2>
        </div>
        <div class="card-body">
            <p class="muted-text">
                The page you’re looking for doesn’t exist or may have been moved.
            </p>
            <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
                <a href="{{ url_for('home') }}" class="primary-button">
                    Go to Dashboard
                </a>
                <a href="{{ url_for('transactions_page') }}" class="secondary-button">
                    View Transactions
                </a>
            </div>
        </div>
    </section>
</div>
{% endblock %}
