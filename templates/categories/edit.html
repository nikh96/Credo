{% extends "base.html" %}

{% block title %}Credo · Edit Category{% endblock %}

{% block content %}
<div class="dashboard">
    <section class="card">
        <div class="card-header">
            <h2 class="card-title">Edit Category</h2>
        </div>

        <div class="card-body">
            <form method="POST" action="{{ url_for('edit_category', cat_id=cat.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label for="name" class="form-label">Category name</label>
                    <input type="text"
                           id="name"
                           name="name"
                           class="text-input"
                           value="{{ cat.name }}"
                           required>
                </div>

                <div style="margin-top: 1rem; display: flex; gap: 0.75rem;">
                    <a href="{{ url_for('categories_page') }}" class="secondary-button">
                        Cancel
                    </a>
                    <button type="submit" class="primary-button">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </section>
</div>
{% endblock %}
