{% extends "base.html" %}

{% block title %}Credo · Categories{% endblock %}

{% block content %}
<div class="dashboard">
    <section class="card">
        <div class="card-header">
            <h2 class="card-title">Categories</h2>
        </div>

        <div class="card-body">
            <form method="POST" action="{{ url_for('categories_page') }}" class="inline-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="name" class="form-label">New category name</label>
                    <input type="text"
                           id="name"
                           name="name"
                           class="text-input"
                           placeholder="e.g., Groceries"
                           required>
                </div>
                <button type="submit" class="primary-button">Add Category</button>
            </form>

            <hr class="divider">

            {% if categories %}
            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th style="width: 160px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                {% for cat in categories %}
                    <tr>
                        <td>{{ cat.name }}</td>
                        <td>
                            <div style="display: flex; gap: 0.4rem;">
                                <a href="{{ url_for('edit_category', cat_id=cat.id) }}"
                                    class="secondary-button secondary-button-small">
                                     Edit
                                </a>
                                <form method="POST"
                                      action="{{ url_for('delete_category', cat_id=cat.id) }}"
                                      style="display:inline;"
                                      onsubmit="return confirm('Delete this category?');">
                                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                    <button type="submit"
                                            class="primary-button primary-button-small"
                                            style="background: #ef4444;">
                                             Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
            {% else %}
                <p class="muted-text">No categories yet. Add your first one above.</p>
            {% endif %}
        </div>
    </section>
</div>
{% endblock %}
