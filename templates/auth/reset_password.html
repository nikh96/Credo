{% extends "base.html" %}

{% block title %}Credo · Reset Password{% endblock %}

{% block content %}
<div class="dashboard">
    <section class="card" style="max-width: 420px; margin: 2rem auto;">
        <div class="card-header">
            <h2 class="card-title">Reset Password</h2>
        </div>
        <div class="card-body">
            <form method="POST" action="">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label for="password" class="form-label">New password</label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="text-input"
                           minlength="8"
                           required>
                </div>

                <div style="margin-top: 0.75rem;">
                    <label for="confirm_password" class="form-label">Confirm new password</label>
                    <input type="password"
                           id="confirm_password"
                           name="confirm_password"
                           class="text-input"
                           minlength="8"
                           required>
                </div>

                <button type="submit" class="primary-button" style="margin-top: 1rem;">
                    Reset Password
                </button>
            </form>
        </div>
    </section>
</div>
{% endblock %}
