{% extends "base.html" %}

{% block title %}Credo · Edit Transaction{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Edit Transaction</h1>
        <p class="auth-subtitle">Update the details of this entry.</p>

        <form class="auth-form"
              method="POST"
              action="{{ url_for('edit_transaction', txn_id=txn.id) }}">
            <label class="field-label" for="t-date">Date</label>
            <input id="t-date"
                   name="date"
                   type="date"
                   class="text-input"
                   value="{{ txn.date.isoformat() }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label class="field-label" for="t-desc">Description</label>
            <input id="t-desc"
                   name="description"
                   type="text"
                   class="text-input"
                   value="{{ txn.description }}">

            <label class="field-label" for="t-category">Category</label>
            <input id="t-category"
                   name="category"
                   type="text"
                   class="text-input"
                   value="{{ txn.category }}">

            <label class="field-label" for="t-amount">Amount</label>
            <input id="t-amount"
                   name="amount"
                   type="number"
                   step="0.01"
                   class="text-input"
                   value="{{ "%.2f"|format(txn.amount) }}">

            <button type="submit" class="primary-button auth-button">Save changes</button>
        </form>
    </div>
</div>
{% endblock %}
