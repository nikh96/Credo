{% extends "base.html" %}

{% block title %}Credo · Add Transaction{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Add Transaction</h1>
        <p class="auth-subtitle">Record a new income or expense.</p>

        <form class="auth-form" method="POST" action="{{ url_for('add_transaction') }}">
            <label class="field-label" for="t-date">Date</label>
            <input id="t-date" name="date" type="date" class="text-input">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label class="field-label" for="t-desc">Description</label>
            <input id="t-desc" name="description" type="text" class="text-input" placeholder="e.g. Grocery, Salary">

            <label class="field-label" for="t-category">Category</label>
            <input id="t-category" name="category" type="text" class="text-input" placeholder="e.g. Food, Income">

            <label class="field-label" for="t-amount">Amount</label>
            <input id="t-amount" name="amount" type="number" step="0.01" class="text-input" placeholder="Use negative for expense">

            <button type="submit" class="primary-button auth-button">Save</button>
        </form>
    </div>
</div>
{% endblock %}
